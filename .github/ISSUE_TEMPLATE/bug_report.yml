name: Bug report
description: Report a reproducible Codex Balance defect without private data.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include credentials, account data, raw logs, private paths, or live screenshots.
  - type: input
    id: version
    attributes:
      label: Source version or commit
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps using synthetic data
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
